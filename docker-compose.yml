services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: freshdex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-freshdex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freshdex}
      POSTGRES_DB: ${POSTGRES_DB:-freshdex}
    # wal_level=logical is required for Debezium/logical replication (Section 4);
    # it can only be set via server config/args, not a client-side SQL statement,
    # and requires a restart to take effect -- setting it here means it's already
    # in place the first time the server comes up.
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freshdex} -d ${POSTGRES_DB:-freshdex}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    container_name: freshdex-redpanda
    restart: unless-stopped
    # --mode dev-container tunes Redpanda for a small, single-node local
    # setup (low memory/fsync overhead) instead of production defaults.
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 30

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: freshdex-connect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      GROUP_ID: freshdex-connect
      CONFIG_STORAGE_TOPIC: freshdex_connect_configs
      OFFSET_STORAGE_TOPIC: freshdex_connect_offsets
      STATUS_STORAGE_TOPIC: freshdex_connect_statuses
      BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  connect-init:
    image: curlimages/curl:8.10.1
    container_name: freshdex-connect-init
    depends_on:
      connect:
        condition: service_healthy
    volumes:
      - ./connectors:/connectors:ro
    entrypoint: ["sh", "/connectors/register.sh"]
    restart: "no"

  redpanda-console:
    image: redpandadata/console:v2.8.4
    container_name: freshdex-redpanda-console
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"

  transform-layer:
    build: ./services/transform-layer
    container_name: freshdex-transform-layer
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      connect-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-freshdex}:${POSTGRES_PASSWORD:-freshdex}@postgres:5432/${POSTGRES_DB:-freshdex}
      SOURCE_TOPIC: freshdex.outbox.document
      REQUESTS_TOPIC: freshdex.embedding.requests
      TOMBSTONES_TOPIC: freshdex.embedding.tombstones
      CONSUMER_GROUP: freshdex-transform-layer

volumes:
  pgdata:
