services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: freshdex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-freshdex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freshdex}
      POSTGRES_DB: ${POSTGRES_DB:-freshdex}
    # wal_level=logical is required for Debezium/logical replication (Section 4);
    # it can only be set via server config/args, not a client-side SQL statement,
    # and requires a restart to take effect -- setting it here means it's already
    # in place the first time the server comes up.
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freshdex} -d ${POSTGRES_DB:-freshdex}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    container_name: freshdex-redpanda
    restart: unless-stopped
    # --mode dev-container tunes Redpanda for a small, single-node local
    # setup (low memory/fsync overhead) instead of production defaults.
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 30

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: freshdex-connect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      GROUP_ID: freshdex-connect
      CONFIG_STORAGE_TOPIC: freshdex_connect_configs
      OFFSET_STORAGE_TOPIC: freshdex_connect_offsets
      STATUS_STORAGE_TOPIC: freshdex_connect_statuses
      BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  connect-init:
    image: curlimages/curl:8.10.1
    container_name: freshdex-connect-init
    depends_on:
      connect:
        condition: service_healthy
    volumes:
      - ./connectors:/connectors:ro
    # Copies register.sh out of the read-only, host-mounted volume and
    # strips \r before running it -- the host file has repeatedly come back
    # with Windows CRLF endings (breaking `sh`) despite .gitattributes,
    # likely an editor auto-resaving it. Self-healing here is more reliable
    # than depending on the host file staying LF.
    entrypoint: ["sh", "-c", "cp /connectors/register.sh /tmp/register.sh && sed -i 's/\\r$//' /tmp/register.sh && sh /tmp/register.sh"]
    restart: "no"

  redpanda-console:
    image: redpandadata/console:v2.8.4
    container_name: freshdex-redpanda-console
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"

  transform-layer:
    build: ./services/transform-layer
    container_name: freshdex-transform-layer
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      connect-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-freshdex}:${POSTGRES_PASSWORD:-freshdex}@postgres:5432/${POSTGRES_DB:-freshdex}
      SOURCE_TOPIC: freshdex.outbox.document
      REQUESTS_TOPIC: freshdex.embedding.requests
      TOMBSTONES_TOPIC: freshdex.embedding.tombstones
      CONSUMER_GROUP: freshdex-transform-layer
      METRICS_PORT: "9100"
    ports:
      - "9100:9100"

  embedding-worker:
    build: ./services/embedding-worker
    container_name: freshdex-embedding-worker
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      connect-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-freshdex}:${POSTGRES_PASSWORD:-freshdex}@postgres:5432/${POSTGRES_DB:-freshdex}
      REQUESTS_TOPIC: freshdex.embedding.requests
      TOMBSTONES_TOPIC: freshdex.embedding.tombstones
      REQUESTS_GROUP: freshdex-embedding-worker-requests
      TOMBSTONES_GROUP: freshdex-embedding-worker-tombstones
      EMBEDDER_BACKEND: local
      EMBEDDER_MODEL: sentence-transformers/all-MiniLM-L6-v2

  query-api:
    build: ./services/query-api
    container_name: freshdex-query-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-freshdex}:${POSTGRES_PASSWORD:-freshdex}@postgres:5432/${POSTGRES_DB:-freshdex}
      EMBEDDER_MODEL: sentence-transformers/all-MiniLM-L6-v2
      RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash-lite
    ports:
      - "8000:8000"

  redis:
    image: redis:7-alpine
    container_name: freshdex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  cache-invalidator:
    build: ./services/cache-invalidator
    container_name: freshdex-cache-invalidator
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      connect-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      SOURCE_TOPIC: freshdex.outbox.document
      CONSUMER_GROUP: freshdex-cache-invalidator
      METRICS_PORT: "9101"
    ports:
      - "9101:9101"

  prometheus:
    image: prom/prometheus:v3.9.0
    container_name: freshdex-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - pushgateway

  pushgateway:
    image: prom/pushgateway:v1.11.2
    container_name: freshdex-pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"

  grafana:
    image: grafana/grafana:12.3.0
    container_name: freshdex-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: freshdex
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
